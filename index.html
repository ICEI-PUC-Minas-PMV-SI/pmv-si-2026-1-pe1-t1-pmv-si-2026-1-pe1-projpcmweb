<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PCMWeb</title>

    <link rel="stylesheet" href="./src/assets/css/login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <main>
        <img src="./logopcmw.png" class="logo" alt="Logo PCMWeb">

        <section>
            <p class="login">Login</p>

            <form id="form-login">
                <div class="input-box">
                    <i class="bi bi-person"></i>
                    <input type="text" id="usuario" placeholder="Usuário">
                </div>

                <div class="input-box">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="pw" placeholder="Senha">
                    <i class="bi bi-eye-slash" id="mostrarSenha"></i>
                </div>

                <a href="./src/pages/dashboard.html" id="bot">Entrar</a>

                <p class="esqueci">Esqueceu sua senha?</p>

                <p class="cadastro">
                    Ainda não possui uma conta? <span>Cadastre-se</span>
                </p>
            </form>
        </section>
    </main>

    <script src="./login.js"></script>
</body>
</html>
