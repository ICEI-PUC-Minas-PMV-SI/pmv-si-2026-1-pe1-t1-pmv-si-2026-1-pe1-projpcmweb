<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Sistema de Manutenção de Màquinas - PCMWeb
    </title>

    <!-- FONT AWESOME -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

    <style>

        /* =====================================================
           RESET
        ===================================================== */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* =====================================================
           BODY
        ===================================================== */

        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            overflow: hidden;
        }

        /* =====================================================
           APP
        ===================================================== */

        .app {
            display: flex;
            height: 100vh;
        }

        /* =====================================================
           SIDEBAR
        ===================================================== */

        .sidebar {
            width: 72px;
            background-color: #1d1d1d;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15px;
            border-right: 1px solid #2a2a2a;
        }

        /* =====================================================
           LOGO
        ===================================================== */

        .logo {
            margin-bottom: 25px;
        }

        .logo img {
            width: 42px;
            height: 42px;
            object-fit: contain;
        }

        /* =====================================================
           MENU
        ===================================================== */

        .menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* =====================================================
           MENU ITEM
        ===================================================== */

        .menu-item {
            width: 42px;
            height: 42px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 17px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            text-decoration: none;
        }

        .menu-item:hover {
            background-color: #1e293b;
        }

        .menu-item.active {
            background-color: #2563eb;
        }

        /* =====================================================
           TOOLTIP
        ===================================================== */

        .tooltip {
            position: absolute;
            left: 65px;
            top: 50%;
            transform: translateY(-50%);
            background-color: #1d1d1d;
            color: white;
            padding: 7px 11px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
            z-index: 999;
        }

        .menu-item:hover .tooltip {
            opacity: 1;
            visibility: visible;
        }

        /* =====================================================
           CONTEÚDO PRINCIPAL
        ===================================================== */

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* =====================================================
           TOPO
        ===================================================== */

        .topbar {
            height: 75px;
            background-color: #1d1d1d;
            display: flex;
            align-items: center;
            padding: 0 25px;
            color: white;
            border-bottom: 1px solid #2a2a2a;
        }

        .topbar h1 {
            font-size: 26px;
        }

        /* =====================================================
           ÁREA VAZIA
        ===================================================== */

        .content-area {
            flex: 1;
        }

        /* =====================================================
           RESPONSIVIDADE
        ===================================================== */

        @media (max-width: 900px) {

            .sidebar {
                width: 60px;
            }

            .menu-item {
                width: 38px;
                height: 38px;
                font-size: 15px;
            }

            .topbar h1 {
                font-size: 20px;
            }

        }

    </style>

</head>

<body>

    <div class="app">

        <!-- BARRA LATERAL -->

        <aside class="sidebar">

            <!-- LOGO -->

            <div class="logo">

                <img
                    src="img/logopcmw.png"

                >

            </div>

            <!-- MENU LATERAL -->

          

<nav class="menu">

    <a

    <a

            Gestão de Ativos
        </span>
    </a>

    <a

    >
        <i class="fa-solid fa-clipboard-list"></i>

        <span class="tooltip">
            Ordem de Serviço
        </span>
    </a>

    <a
        href="./src/pages/planejamento.html"

    >
        <i class="fa-solid fa-calendar-check"></i>

        <span class="tooltip">
            Plano Preventivo

    </a>

    <a

        <span class="tooltip">

    </a>

    <a

    >

        <span class="tooltip">
            PCM
        </span>
    </a>

    <a
        href="./src/pages/trainamento.html"

        <span class="tooltip">
            Treinamento
        </span>
    </a>

    <a

            Login
        </span>
    </a>

    <a

        <span class="tooltip">
            Compras
        </span>
    </a>

    <a
        href="./src/pages/financeiro.html"
        class="menu-item"
    >
        <i class="fa-solid fa-money-bill-wave"></i>

        <span class="tooltip">
            Financeiro
        </span>
    </a>

</nav>





        </aside>

        <!-- CONTEÚDO PRINCIPAL -->

        <main class="main-content">

            <!-- TOPO -->

            <header class="topbar">

                <h1>
                    Sistema de Manutenção de Màquinas
                </h1>

            </header>

            <!-- ÁREA VAZIA -->

            <section class="content-area"></section>

        </main>

    </div>

</body>

</html>
