<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Ordem de Serviço</title>

    <link
        rel="stylesheet"
        href="../assets/css/TelaOS.css"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >
</head>

<body>

    <div class="app">

        <aside class="sidebar">

            <div class="logo">
                <img src="../assets/img/logopcmw.png" alt="PCMWeb">
            </div>

            <nav class="menu">

                <div class="menu-item">
                    <i class="fa-solid fa-chart-line"></i>
                    <span class="tooltip">Dashboard</span>
                </div>

                <div class="menu-item">
                    <i class="fa-solid fa-industry"></i>
                    <span class="tooltip">Gestão de Ativos</span>
                </div>

                <div class="menu-item active">
                    <i class="fa-solid fa-clipboard-list"></i>
                    <span class="tooltip">Ordem de Serviço</span>
                </div>

                <div class="menu-item">
                    <i class="fa-solid fa-calendar-check"></i>
                    <span class="tooltip">Preventivas</span>
                </div>

                <div class="menu-item">
                    <i class="fa-solid fa-boxes-stacked"></i>
                    <span class="tooltip">Estoque</span>
                </div>

                <div class="menu-item">
                    <i class="fa-solid fa-screwdriver-wrench"></i>
                    <span class="tooltip">PCM</span>
                </div>

                <div class="menu-item">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <span class="tooltip">Treinamento</span>
                </div>

                <div class="menu-item">
                    <i class="fa-solid fa-user-lock"></i>
                    <span class="tooltip">Login</span>
                </div>

                <div class="menu-item">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="tooltip">Compras</span>
                </div>

                <div class="menu-item">
                    <i class="fa-solid fa-money-bill-wave"></i>
                    <span class="tooltip">Financeiro</span>
                </div>

            </nav>

            <div class="logout">

                <div class="menu-item" onclick="logout()">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span class="tooltip">Sair</span>
                </div>

            </div>

        </aside>

        <main class="main-content">

            <header class="topbar">

                <h1>Ordem de Serviço</h1>

                <button type="button">
                    + Nova OS
                </button>

            </header>

            <section class="content-area">

                <div class="card">

                    <h2>Cadastro de Ordem de Serviço</h2>

                    <p>
                        Preencha as informações da máquina, técnico e manutenção.
                    </p>

                    <form>

                        <div class="form-grid">

                            <div class="form-group">

                                <label for="maquina">
                                    Máquina
                                </label>

                                <input
                                    type="text"
                                    id="maquina"
                                    name="maquina"
                                >

                            </div>

                            <div class="form-group">

                                <label for="tecnico">
                                    Técnico
                                </label>

                                <input
                                    type="text"
                                    id="tecnico"
                                    name="tecnico"
                                >

                            </div>

                            <div class="form-group single">

                                <label for="status">
                                    Status
                                </label>

                                <select
                                    id="status"
                                    name="status"
                                >
                                    <option value="">
                                        Selecione
                                    </option>

                                    <option value="em_andamento">
                                        Em andamento
                                    </option>

                                    <option value="pausado">
                                        Pausado
                                    </option>

                                    <option value="concluido">
                                        Concluído
                                    </option>
                                </select>

                            </div>

                            <div class="quebra-linha"></div>

                            <div class="form-group full">

                                <label for="descricao">
                                    Descrição do Problema
                                </label>

                                <textarea
                                    id="descricao"
                                    name="descricao"
                                    rows="5"
                                ></textarea>

                            </div>

                            <div class="form-group full">

                                <label for="pecas">
                                    Peças utilizadas
                                </label>

                                <textarea
                                    id="pecas"
                                    name="pecas"
                                    rows="4"
                                ></textarea>

                            </div>

                            <div class="form-group">

                                <label for="data_inicio">
                                    Data de Início
                                </label>

                                <input
                                    type="date"
                                    id="data_inicio"
                                    name="data_inicio"
                                >

                            </div>

                            <div class="form-group">

                                <label for="data_conclusao">
                                    Data de Conclusão
                                </label>

                                <input
                                    type="date"
                                    id="data_conclusao"
                                    name="data_conclusao"
                                >

                            </div>

                        </div>

                        <div class="form-buttons">

                            <button
                                type="button"
                                class="cancel-btn"
                            >
                                Limpar
                            </button>

                            <button
                                type="submit"
                                class="save-btn"
                            >
                                Salvar
                            </button>

                        </div>

                        <div
                            id="mensagem"
                            class="message"
                        ></div>

                    </form>

                </div>

            </section>

        </main>

    </div>

    <script src="../assets/js/TelaOS.js"></script>

</body>

</html>
