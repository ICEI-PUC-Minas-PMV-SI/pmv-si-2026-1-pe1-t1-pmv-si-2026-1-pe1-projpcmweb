<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Ordem de Serviço - PCMWeb
    </title>

    <!-- FONT AWESOME -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

    <style>

        /* =====================================================
           RESET
        ===================================================== */

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* =====================================================
           BODY
        ===================================================== */

        body{

            font-family: Arial, sans-serif;

            background-color: #0f172a;

            overflow: hidden;
        }

        /* =====================================================
           APP
        ===================================================== */

        .app{

            display: flex;

            height: 100vh;
        }

        /* =====================================================
           SIDEBAR
        ===================================================== */

        .sidebar{

            width: 72px;

            background-color: #1D1D1D;

            display: flex;

            flex-direction: column;

            align-items: center;

            padding-top: 15px;

            border-right: 1px solid #2a2a2a;
        }

        /* =====================================================
           LOGO
        ===================================================== */

        .logo{

            margin-bottom: 25px;
        }

        .logo img{

            width: 42px;

            height: 42px;

            object-fit: contain;
        }

        /* =====================================================
           MENU
        ===================================================== */

        .menu{

            display: flex;

            flex-direction: column;

            gap: 10px;
        }

        /* =====================================================
           MENU ITEM
        ===================================================== */

        .menu-item{

            width: 42px;

            height: 42px;

            display: flex;

            justify-content: center;

            align-items: center;

            color: white;

            font-size: 17px;

            border-radius: 10px;

            cursor: pointer;

            transition: 0.3s;

            position: relative;
        }

        .menu-item:hover{

            background-color: #1e293b;
        }

        .menu-item.active{

            background-color: #2563eb;
        }

        /* =====================================================
           TOOLTIP
        ===================================================== */

        .tooltip{

            position: absolute;

            left: 65px;

            top: 50%;

            transform: translateY(-50%);

            background-color: #1D1D1D;

            color: white;

            padding: 7px 11px;

            border-radius: 6px;

            font-size: 12px;

            white-space: nowrap;

            opacity: 0;

            visibility: hidden;

            transition: 0.2s;

            z-index: 999;
        }

        .menu-item:hover .tooltip{

            opacity: 1;

            visibility: visible;
        }

        /* =====================================================
           MAIN CONTENT
        ===================================================== */

        .main-content{

            flex: 1;

            display: flex;

            flex-direction: column;
        }

        /* =====================================================
           TOPBAR
        ===================================================== */

        .topbar{

            height: 75px;

            background-color: #1D1D1D;

            display: flex;

            align-items: center;

            justify-content: space-between;

            padding: 0 25px;

            color: white;

            border-bottom: 1px solid #2a2a2a;
        }

        .topbar h1{

            font-size: 26px;
        }

        /* =====================================================
           BUTTON
        ===================================================== */

        .topbar button{

            background-color: #2563eb;

            color: white;

            border: none;

            padding: 10px 16px;

            border-radius: 8px;

            cursor: pointer;

            font-size: 14px;

            transition: 0.3s;
        }

        .topbar button:hover{

            background-color: #1d4ed8;
        }

        /* =====================================================
           CONTENT AREA
        ===================================================== */

        .content-area{

            flex: 1;

            padding: 18px;

            overflow-y: auto;
        }

        /* =====================================================
           CARD
        ===================================================== */

        .card{

            background-color: #f8fafc;

            border-radius: 12px;

            padding: 22px;

            max-width: 900px;
        }

        .card h2{

            color: #111827;

            margin-bottom: 6px;
        }

        .card p{

            color: #475569;

            margin-bottom: 22px;

            font-size: 14px;
        }

        /* =====================================================
           FORMULÁRIO
        ===================================================== */

        .form-grid{

            display: grid;

            grid-template-columns: 1fr 1fr;

            gap: 18px;
        }

        .form-group{

            display: flex;

            flex-direction: column;

            gap: 7px;
        }

        .form-group.full{

            grid-column: 1 / 3;
        }

        .form-group.single{

            grid-column: 1 / 2;
        }

        .quebra-linha{

            grid-column: 1 / 3;

            height: 0;
        }

        label{

            font-size: 14px;

            font-weight: bold;

            color: #111827;
        }

        input,
        select,
        textarea{

            width: 100%;

            padding: 12px;

            border: 1px solid #d1d5db;

            border-radius: 8px;

            font-size: 14px;

            font-family: Arial, sans-serif;

            outline: none;

            background-color: white;
        }

        input:focus,
        select:focus,
        textarea:focus{

            border-color: #2563eb;

            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        textarea{

            resize: vertical;
        }

        /* =====================================================
           BUTTONS
        ===================================================== */

        .form-buttons{

            display: flex;

            justify-content: flex-end;

            gap: 10px;

            margin-top: 24px;
        }

        .save-btn{

            background-color: #2563eb;

            color: white;

            border: none;

            padding: 11px 18px;

            border-radius: 8px;

            cursor: pointer;

            font-size: 14px;

            transition: 0.3s;
        }

        .save-btn:hover{

            background-color: #1d4ed8;
        }

        .cancel-btn{

            background-color: #d1d5db;

            color: #111827;

            border: none;

            padding: 11px 18px;

            border-radius: 8px;

            cursor: pointer;

            font-size: 14px;

            transition: 0.3s;
        }

        .cancel-btn:hover{

            background-color: #cbd5e1;
        }

        /* =====================================================
           MENSAGEM
        ===================================================== */

        .message{

            display: none;

            margin-top: 18px;

            padding: 12px;

            border-radius: 8px;

            font-size: 14px;

            background-color: #dcfce7;

            color: #166534;

            border: 1px solid #86efac;
        }

        /* =====================================================
           RESPONSIVIDADE
        ===================================================== */

        @media(max-width: 900px){

            .form-grid{

                grid-template-columns: 1fr;
            }

            .form-group.full,
            .form-group.single,
            .quebra-linha{

                grid-column: 1;
            }

            .sidebar{

                width: 60px;
            }

            .menu-item{

                width: 38px;

                height: 38px;

                font-size: 15px;
            }

            .topbar h1{

                font-size: 20px;
            }
        }

    </style>

</head>

<body>

    <div class="app">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <!-- LOGO -->

            <div class="logo">

                <img src="img/logopcmw.png" alt="Logo PCMWeb">

            </div>

            <!-- MENU LATERAL -->

            <nav class="menu">

                <div class="menu-item">

                    <i class="fa-solid fa-chart-line"></i>

                    <span class="tooltip">
                        Dashboard Operacional
                    </span>

                </div>

                <div class="menu-item">

                    <i class="fa-solid fa-industry"></i>

                    <span class="tooltip">
                        Gestão de Ativos
                    </span>

                </div>

                <div class="menu-item active">

                    <i class="fa-solid fa-clipboard-list"></i>

                    <span class="tooltip">
                        Ordem de Serviço
                    </span>

                </div>

                <div class="menu-item">

                    <i class="fa-solid fa-calendar-check"></i>

                    <span class="tooltip">
                        Plano Preventivo
                    </span>

                </div>

                <div class="menu-item">

                    <i class="fa-solid fa-boxes-stacked"></i>

                    <span class="tooltip">
                        Gestão de Estoque
                    </span>

                </div>

                <div class="menu-item">

                    <i class="fa-solid fa-screwdriver-wrench"></i>

                    <span class="tooltip">
                        PCM
                    </span>

                </div>

                <div class="menu-item">

                    <i class="fa-solid fa-graduation-cap"></i>

                    <span class="tooltip">
                        Treinamento
                    </span>

                </div>

                <div class="menu-item">

                    <i class="fa-solid fa-user-lock"></i>

                    <span class="tooltip">
                        Login
                    </span>

                </div>

                <div class="menu-item">

                    <i class="fa-solid fa-cart-shopping"></i>

                    <span class="tooltip">
                        Compras
                    </span>

                </div>

                <div class="menu-item">

                    <i class="fa-solid fa-money-bill-wave"></i>

                    <span class="tooltip">
                        Financeiro
                    </span>

                </div>

            </nav>

        </aside>

        <!-- CONTEÚDO PRINCIPAL -->

        <main class="main-content">

            <!-- TOPO -->

            <header class="topbar">

                <h1>
                    Ordem de Serviço
                </h1>

                <button type="button">
                    + Nova OS
                </button>

            </header>

            <!-- ÁREA DA TELA -->

            <section class="content-area">

                <div class="card">

                    <h2>
                        Cadastro de Ordem de Serviço
                    </h2>

                    <p>
                        Preencha as informações da máquina, técnico responsável, status e descrição do problema.
                    </p>

                    <form onsubmit="event.preventDefault(); document.getElementById('mensagem').style.display = 'block';">

                        <div class="form-grid">

                            <div class="form-group">

                                <label for="maquina">
                                    Máquina
                                </label>

                                <input
                                    type="text"
                                    id="maquina"
                                    name="maquina"
                                    placeholder="Ex: Esteira 01"
                                >

                            </div>

                            <div class="form-group">

                                <label for="tecnico">
                                    Técnico
                                </label>

                                <input
                                    type="text"
                                    id="tecnico"
                                    name="tecnico"
                                    placeholder="Nome do técnico"
                                >

                            </div>

                            <div class="form-group single">

                                <label for="status">
                                    Status
                                </label>

                                <select id="status" name="status">

                                    <option value="">
                                        Selecione
                                    </option>

                                    <option value="em_andamento">
                                        Em andamento
                                    </option>

                                    <option value="pausado">
                                        Pausado
                                    </option>

                                    <option value="concluido">
                                        Concluído
                                    </option>

                                </select>

                            </div>

                            <div class="quebra-linha"></div>

                            <div class="form-group">

                                <label for="data_inicio">
                                    Data de Início
                                </label>

                                <input
                                    type="date"
                                    id="data_inicio"
                                    name="data_inicio"
                                >

                            </div>

                            <div class="form-group">

                                <label for="data_conclusao">
                                    Data de Conclusão
                                </label>

                                <input
                                    type="date"
                                    id="data_conclusao"
                                    name="data_conclusao"
                                >

                            </div>

                            <div class="form-group full">

                                <label for="descricao">
                                    Descrição do Problema
                                </label>

                                <textarea
                                    id="descricao"
                                    name="descricao"
                                    rows="5"
                                    placeholder="Descreva o problema identificado"
                                ></textarea>

                            </div>

                            <div class="form-group full">

                                <label for="pecas">
                                    Peças utilizadas
                                </label>

                                <textarea
                                    id="pecas"
                                    name="pecas"
                                    rows="4"
                                    placeholder="Informe as peças utilizadas na manutenção"
                                ></textarea>

                            </div>

                        </div>

                        <div class="form-buttons">

                            <button type="reset" class="cancel-btn">
                                Limpar
                            </button>

                            <button type="submit" class="save-btn">
                                Salvar
                            </button>

                        </div>

                        <div id="mensagem" class="message">
                            OS criada com sucesso.
                        </div>

                    </form>

                </div>

            </section>

        </main>

    </div>

</body>

</html>
