<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        PCMWeb - Gestão de Estoque
    </title>

    <!-- CSS -->

    <link
        rel="stylesheet"
        href=".src/assets/css/Estoque.css"
    >

    <!-- FONT AWESOME -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

</head>

<body>

    <div class="app">

        <!-- =====================================================
             SIDEBAR
        ===================================================== -->

        <aside class="sidebar">

            <!-- LOGO -->

            <div class="logo">

                <img src="logopcmw.png" alt="PCMWeb">

            </div>

            <!-- MENU -->

            <nav class="menu">

                <!-- DASHBOARD -->

                <div class="menu-item">

                    <i class="fa-solid fa-chart-line"></i>

                    <span class="tooltip">
                        Dashboard
                    </span>

                </div>

                <!-- GESTÃO DE ATIVOS -->

                <div class="menu-item">

                    <i class="fa-solid fa-industry"></i>

                    <span class="tooltip">
                        Gestão de Ativos
                    </span>

                </div>

                <!-- ORDEM DE SERVIÇO -->

                <div class="menu-item">

                    <i class="fa-solid fa-clipboard-list"></i>

                    <span class="tooltip">
                        Ordem de Serviço
                    </span>

                </div>

                <!-- PREVENTIVAS -->

                <div class="menu-item">

                    <i class="fa-solid fa-calendar-check"></i>

                    <span class="tooltip">
                        Preventivas
                    </span>

                </div>

                <!-- ESTOQUE -->

                <div class="menu-item active">

                    <i class="fa-solid fa-boxes-stacked"></i>

                    <span class="tooltip">
                        Estoque
                    </span>

                </div>

                <!-- PCM -->

                <div class="menu-item">

                    <i class="fa-solid fa-screwdriver-wrench"></i>

                    <span class="tooltip">
                        PCM
                    </span>

                </div>

                <!-- TREINAMENTO -->

                <div class="menu-item">

                    <i class="fa-solid fa-graduation-cap"></i>

                    <span class="tooltip">
                        Treinamento
                    </span>

                </div>

                <!-- LOGIN -->

                <div class="menu-item">

                    <i class="fa-solid fa-user-lock"></i>

                    <span class="tooltip">
                        Login
                    </span>

                </div>

                <!-- COMPRAS -->

                <div class="menu-item">

                    <i class="fa-solid fa-cart-shopping"></i>

                    <span class="tooltip">
                        Compras
                    </span>

                </div>

                <!-- FINANCEIRO -->

                <div class="menu-item">

                    <i class="fa-solid fa-money-bill-wave"></i>

                    <span class="tooltip">
                        Financeiro
                    </span>

                </div>
                
                <div class="logout">
    <div class="menu-item" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span class="tooltip">Sair</span>
    </div>

            </nav>

        </aside>

        <!-- =====================================================
             MAIN CONTENT
        ===================================================== -->

        <main class="main-content">

            <!-- TOPBAR -->

            <header class="topbar">

                <h1>
                    Gestão de Estoque
                </h1>

                <button id="btnAdicionar">

                    + Adicionar Peça

                </button>

            </header>

            <!-- CONTENT AREA -->

            <section class="content-area">

                <div class="card">

                    <!-- PESQUISA -->

                    <input
                        type="text"
                        id="pesquisa"
                        class="search"
                        placeholder="Localizar peça no estoque"
                    >

                    <!-- CONTADOR -->

                    <h3 class="contador">

                        Total de peças:
                        <span id="totalPecas">
                            4
                        </span>

                    </h3>

                    <!-- TABELA -->

                    <div class="table-container">

                        <table>

                            <thead>

                                <tr>

                                    <th>ID</th>

                                    <th>Item</th>

                                    <th>Quantidade</th>

                                    <th>Estoque mínimo</th>

                                    <th>Status</th>

                                    <th>Ações</th>

                                </tr>

                            </thead>

                            <tbody id="tbody">

                                


                            </tbody>

                        </table>

                    </div>

                </div>

            </section>

        </main>

    </div>

    <!-- =====================================================
         MODAL
    ===================================================== -->

    <div class="modal" id="modal">

        <div class="modal-box">

            <h2>
                Adicionar Peça
            </h2>

            <input
                type="text"
                id="idPeca"
                placeholder="ID"
            >

            <input
                type="text"
                id="nomePeca"
                placeholder="Nome da peça"
            >

            <input
                type="number"
                id="qtdPeca"
                placeholder="Quantidade"
            >

            <input
                type="number"
                id="minPeca"
                placeholder="Estoque mínimo"
            >

            <div class="modal-buttons">

                <button
                    class="cancel-btn"
                    id="fecharModal"
                >
                    Cancelar
                </button>

                <button
                    class="save-btn"
                    id="salvarPeca"
                >
                    Salvar
                </button>

            </div>

        </div>

    </div>

    <!-- JS -->

    <script src="src/assets/js/Estoque.js"></script>

</body>
</html>
