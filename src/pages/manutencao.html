<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCMWeb - Manutenção Preventiva</title>

    <link rel="stylesheet" href="manutencao.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="app">

    <aside class="sidebar">
        <div class="logo">
            <img src="logopcmw.png" alt="Logo PCMWeb">
        </div>

                <nav class="menu">

                <a class="menu-item" href="dashboard.html">
                    <i class="fa-solid fa-chart-line"></i>
                    <span class="tooltip">Dashboard Operacional</span>
                </a>

                <a class="menu-item" href="gestaodeativos.html">
                    <i class="fa-solid fa-industry"></i>
                    <span class="tooltip">Gestao de Ativos</span>
                </a>

                <a class="menu-item" href="TelaOS.html">
                    <i class="fa-solid fa-clipboard-list"></i>
                    <span class="tooltip">Ordem de Servico</span>
                </a>

                <a class="menu-item active" href="manutencao.html">
                    <i class="fa-solid fa-calendar-check"></i>
                    <span class="tooltip">Plano Preventivo</span>
                </a>

                <a class="menu-item" href="Estoque.html">
                    <i class="fa-solid fa-boxes-stacked"></i>
                    <span class="tooltip">Gestao de Estoque</span>
                </a>

                <a class="menu-item" href="planejamento.html">
                    <i class="fa-solid fa-screwdriver-wrench"></i>
                    <span class="tooltip">PCM</span>
                </a>

                <a class="menu-item" href="trainamento.html">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <span class="tooltip">Treinamento</span>
                </a>

                <a class="menu-item" href="gestaocompras.html">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="tooltip">Compras</span>
                </a>

            </nav>

<div class="logout">
    <div class="menu-item" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span class="tooltip">Sair</span>
    </div>
</div>

    </aside>

    <main class="main-content">

        <header class="topbar">
            <div>
                <h1>Manutenção Preventiva</h1>
                
            </div>
        </header>

   <section class="kpi-grid">
    <div class="kpi-card">
        <h2 id="total">0</h2>
        <p>Total</p>
    </div>

    <div class="kpi-card warning">
        <h2 id="ativas">0</h2>
        <p>Ativas</p>
    </div>

    <div class="kpi-card success">
        <h2 id="concluidas">0</h2>
        <p>Concluídas</p>
    </div>

</section>

        <section class="content-area">

            <div class="card">

                <div class="tabs">
                    <div class="tab active">Dados Gerais</div>
                 
                </div>

                <section class="cadastro-plano">
                    <h2>Cadastrar Plano</h2>

                    <div class="form-grid">
                        <div>
                            <label>Nome do Plano</label>
                            <input type="text" id="nomePlano" placeholder="Digite o nome do plano">
                        </div>

                        <div>
                            <label>Equipamento</label>
                            <select id="equipamento">
                                <option value="">Selecione o equipamento</option>
                                <option>Forno Industrial</option>
                                <option>Gerador</option>
                                <option>Torno Mecânico</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div>
                            <label>Tipo de Manutenção</label>
                            <select id="tipo">
                                <option value="">Selecione o tipo</option>
                                <option>Preventiva</option>
                                <option>Preditiva</option>
                                <option>Corretiva</option>
                            </select>
                        </div>

                        <div>
                            <label>Frequência</label>
                            <select id="frequencia">
                                <option value="">Selecione a frequência</option>
                                <option>7 dias</option>
                                <option>15 dias</option>
                                <option>30 dias</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div>
                            <label>Data de início</label>
                            <input type="date" id="dataInicio">
                        </div>

                        <div>
                            <label>Responsável</label>
                            <input type="text" id="responsavel" placeholder="Nome do responsável">
                        </div>
                    </div>

                    <label>Observações</label>
                    <textarea id="observacoes" placeholder="Digite observações adicionais..."></textarea>

                    <div class="form-buttons">
                        <button class="save-btn" onclick="salvarPlano()">Salvar Plano</button>
                    </div>
                </section>

                <section class="planos-cadastrados">
                    <h2>Planos Cadastrados</h2>

         <table>
    <thead>
        <tr>
            <th>Plano</th>
            <th>Equipamento</th>
            <th>Status</th>
            <th>Data</th>
            <th>Ação</th>
        </tr>
    </thead>

    <tbody id="tabelaPlanos"></tbody>
</table>
                </section>

            </div>

        </section>

    </main>

</div>

<script src="manutencao.js"></script>

</body>
</html>
