<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PCMWeb - Treinamentos</title>

    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="treinamento.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>

<body>

<div class="app">

    <!-- SIDEBAR (IGUAL AO DASHBOARD) -->

    <aside class="sidebar">

        <div class="logo">
            <img src="imgs/logo.png">
        </div>

        <nav class="menu">

            <div class="menu-item">
                <i class="fa-solid fa-chart-line"></i>
                <span class="tooltip" href="">Dashboard Operacional</span>
            </div>

            <div class="menu-item">
                <i class="fa-solid fa-industry"></i>
                <span class="tooltip" href="">Gestão de Ativos</span>
            </div>

            <div class="menu-item">
                <i class="fa-solid fa-clipboard-list"></i>
                <span class="tooltip" href="">Ordem de Serviço</span>
            </div>

            <div class="menu-item">
                <i class="fa-solid fa-calendar-check"></i>
                <span class="tooltip" href="">Plano Preventivo</span>
            </div>

            <div class="menu-item">
                <i class="fa-solid fa-boxes-stacked"></i>
                <span class="tooltip" href="">Gestão de Estoque</span>
            </div>

            <div class="menu-item">
                <i class="fa-solid fa-screwdriver-wrench"></i>
                <span class="tooltip" href="">PCM</span>
            </div>

            <div class="menu-item active">
                <i class="fa-solid fa-graduation-cap"></i>
                <span class="tooltip">Treinamento</span>
            </div>

            <div class="menu-item">
                <i class="fa-solid fa-user-lock"></i>
                <span class="tooltip" href="">Login</span>
            </div>

            <div class="menu-item">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="tooltip" href="">Compras</span>
            </div>

            <div class="menu-item">
                <i class="fa-solid fa-money-bill-wave"></i>
                <span class="tooltip" href="">Financeiro</span>
            </div>

        </nav>

    </aside>

    <!-- MAIN -->

    <main class="main-content">

        <header class="topbar">
            <h1 class="tit1">Treinamento</h1>
        </header>

        <div class="content-area">

            <!-- VÍDEO -->

            <div class="card-dark">

                <h2 class="video-title">Vídeo 1</h2>

                <div class="video-container">

                    <div class="play-button">
                        <i class="fa-solid fa-play"></i>
                    </div>

                </div>

                <div class="video-buttons">
                    <button>Anterior</button>
                    <button>Próximo</button>
                </div>

            </div>

            <!-- CHECKBOX LISTA (DO PRIMEIRO CÓDIGO) -->

            <div class="card-dark" style="margin-top: 20px;">

                <h3 class="section-title">Treinamentos</h3>

                <div class="training-item">
                    <input type="checkbox">
                    <label>Vídeo 1</label>
                </div>

                <div class="training-item">
                    <input type="checkbox">
                    <label>Vídeo 2</label>
                </div>

                <div class="training-item">
                    <input type="checkbox">
                    <label>Vídeo 3</label>
                </div>

                <div class="training-item">
                    <input type="checkbox">
                    <label>Vídeo 4</label>
                </div>

                <div class="training-item">
                    <input type="checkbox">
                    <label>Vídeo 5</label>
                </div>

                <div class="training-item">
                    <input type="checkbox">
                    <label>Vídeo 6</label>
                </div>

                <div class="training-item">
                    <input type="checkbox">
                    <label>Vídeo 7</label>
                </div>

                <div class="training-item">
                    <input type="checkbox">
                    <label>Vídeo 8</label>
                </div>

                <div class="training-item">
                    <input type="checkbox">
                    <label>Vídeo 9</label>
                </div>

            </div>

        </div>

    </main>

</div>

</body>
</html>
